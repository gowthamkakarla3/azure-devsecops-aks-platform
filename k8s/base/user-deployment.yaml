apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: devsecops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: acrgowthamdevops.azurecr.io/user-service:v1
        ports:
        - containerPort: 3001
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"