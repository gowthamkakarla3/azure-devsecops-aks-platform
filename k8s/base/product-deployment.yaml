apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: devsecops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: acrgowthamdevops.azurecr.io/product-service:v1
        ports:
        - containerPort: 3002